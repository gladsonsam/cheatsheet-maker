name: Build Desktop App

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to create the GitHub release when building from a tag.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: NSIS installer (.exe) + .msi
          - platform: windows-latest
          # Linux: .AppImage + .deb
          - platform: ubuntu-22.04
          # macOS: .dmg + .zip
          - platform: macos-latest

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build renderer + electron bundles
        run: npm run build:electron

      # On a tag push, electron-builder publishes every platform's installers
      # into a single draft GitHub release (keyed by the package version), which
      # it creates on first publish and reuses thereafter. On
      # branch/PR/dispatch builds we don't pass a token, so it only builds.
      - name: Package (and publish to draft release on tags)
        run: >-
          npx electron-builder
          ${{ startsWith(github.ref, 'refs/tags/') && '--publish always' || '--publish never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload installers as build artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: cheatsheet-maker-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            release/*.exe
            release/*.msi
            release/*.AppImage
            release/*.deb
            release/*.dmg
            release/*.zip
